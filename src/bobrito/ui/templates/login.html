<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bobrito Operator Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full bg-slate-950 flex items-center justify-center text-slate-300 antialiased">
  <div class="w-full max-w-sm px-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img
        src="{{ prefix }}/static/images/bobrito-logo.png"
        alt="Bobrito logo"
        class="mx-auto h-16 w-auto mb-3"
      >
      <h1 class="text-2xl font-bold text-white tracking-tight">Bobrito</h1>
      <p class="text-slate-500 text-sm mt-1">Operator Panel</p>
    </div>

    <!-- Flash message -->
    {% if flash %}
    <div class="mb-4 border rounded-lg px-4 py-3 text-sm
      {% if flash.type == 'error' %}bg-red-950/60 border-red-700/60 text-red-300
      {% else %}bg-blue-950/60 border-blue-700/60 text-blue-300{% endif %}"
      x-data="{ show: true }" x-show="show">
      <div class="flex items-center justify-between gap-2">
        <span>{{ flash.message }}</span>
        <button @click="show = false" class="text-current opacity-50 hover:opacity-100">&times;</button>
      </div>
    </div>
    {% endif %}

    <!-- Login form -->
    <form method="post" action="{{ prefix }}/login" class="bg-slate-900 border border-slate-700/60 rounded-xl p-6 space-y-4">
      <div>
        <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="username"
          autofocus
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-colors"
          placeholder="admin"
        >
      </div>
      <div>
        <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-colors"
          placeholder="••••••••"
        >
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50">
        Sign in
      </button>
    </form>

    <p class="text-center text-slate-600 text-xs mt-6">
      Bobrito Trading Bot · Internal Operator Access Only
    </p>
  </div>
</body>
</html>
