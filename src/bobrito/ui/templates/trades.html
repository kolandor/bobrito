{% extends "base.html" %}
{% block title %}Trades History{% endblock %}

{% block content %}
<div class="mb-5">
  <h2 class="text-lg font-semibold text-white">Trades History</h2>
  <p class="text-slate-500 text-sm">Closed positions — most recent first</p>

</div>
{% endblock %}
