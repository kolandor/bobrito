name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          pip install --upgrade pip
          pip install ruff black mypy
      - name: Run Ruff
        run: ruff check src/ tests/
      - name: Check Black formatting
        run: black --check src/ tests/
      - name: Run mypy
        run: mypy src/bobrito --ignore-missing-imports

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/unit tests/integration \
            --cov=bobrito \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: bobrito:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name bobrito-ci \
            -e BOT_MODE=paper \
            -e API_SECRET_KEY=test-secret-key-for-ci \
            -p 8080:8080 \
            bobrito:ci
          sleep 15
          curl -f http://localhost:8080/health || exit 1
          docker stop bobrito-ci

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bobrito:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bobrito:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
